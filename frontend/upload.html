<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据上传 / UPLOAD</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans+SC:wght@300;400;500&display=swap');

  :root {
    --bg:        #0d0f0e;
    --surface:   #141716;
    --border:    #252b27;
    --border-hi: #3a4440;
    --accent:    #00e5a0;
    --accent-dim:#00a872;
    --accent-glow: rgba(0,229,160,0.15);
    --warn:      #ffb800;
    --danger:    #ff4d4d;
    --success:   #00e5a0;
    --text:      #c8d4cf;
    --text-dim:  #5c6e68;
    --text-hi:   #eaf5f0;
    --mono:      'IBM Plex Mono', monospace;
    --sans:      'IBM Plex Sans SC', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* scanline overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.07) 2px,
      rgba(0,0,0,0.07) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  /* ── layout ── */
  .shell {
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* ── header ── */
  .header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 48px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
  }
  .header-tag {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    font-weight: 500;
  }
  .header h1 {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
    color: var(--text-hi);
    letter-spacing: -0.02em;
  }
  .header-sub {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  /* ── section label ── */
  .label {
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .label::before {
    content: '//';
    color: var(--accent-dim);
    font-weight: 600;
  }

  /* ── drop zone ── */
  .drop-zone {
    position: relative;
    border: 1px dashed var(--border-hi);
    border-radius: 4px;
    padding: 52px 32px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    background: var(--surface);
    overflow: hidden;
  }
  .drop-zone::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent-glow);
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  .drop-zone:hover,
  .drop-zone.dragover {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), inset 0 0 40px rgba(0,229,160,0.04);
  }
  .drop-zone:hover::after,
  .drop-zone.dragover::after { opacity: 1; }

  .drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .drop-icon {
    width: 40px;
    height: 40px;
    margin: 0 auto 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border-hi);
    border-radius: 3px;
    color: var(--accent-dim);
    transition: color 0.2s, border-color 0.2s;
    font-size: 18px;
  }
  .drop-zone:hover .drop-icon,
  .drop-zone.dragover .drop-icon {
    color: var(--accent);
    border-color: var(--accent);
  }

  .drop-primary {
    font-size: 13px;
    color: var(--text);
    font-weight: 500;
    margin-bottom: 6px;
  }
  .drop-secondary {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }

  /* ── file preview ── */
  .file-preview {
    display: none;
    margin-top: 16px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: #0a0c0b;
    padding: 14px 16px;
    align-items: center;
    gap: 12px;
  }
  .file-preview.visible { display: flex; }

  .file-preview-icon {
    flex-shrink: 0;
    width: 30px;
    height: 30px;
    border: 1px solid var(--border-hi);
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: var(--accent-dim);
    font-weight: 600;
    letter-spacing: -0.05em;
  }
  .file-preview-info { flex: 1; min-width: 0; }
  .file-preview-name {
    color: var(--text-hi);
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-size: 12px;
  }
  .file-preview-meta {
    color: var(--text-dim);
    font-size: 11px;
    margin-top: 2px;
  }
  .file-clear {
    flex-shrink: 0;
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-family: var(--mono);
    font-size: 16px;
    line-height: 1;
    padding: 4px;
    transition: color 0.15s;
  }
  .file-clear:hover { color: var(--danger); }

  /* ── note box ── */
  .note {
    margin-top: 24px;
    border-left: 2px solid var(--border-hi);
    padding: 12px 16px;
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.8;
  }
  .note strong {
    color: var(--warn);
    font-weight: 500;
  }
  .note code {
    color: var(--accent-dim);
    background: rgba(0,229,160,0.06);
    padding: 1px 5px;
    border-radius: 2px;
    font-size: 11px;
  }

  /* ── submit ── */
  .actions {
    margin-top: 28px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .btn-submit {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--bg);
    background: var(--accent);
    border: none;
    border-radius: 3px;
    padding: 11px 28px;
    cursor: pointer;
    transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }
  .btn-submit:hover {
    background: #00f5ad;
    box-shadow: 0 0 20px rgba(0,229,160,0.3);
  }
  .btn-submit:active { transform: translateY(1px); }
  .btn-submit:disabled {
    background: var(--border-hi);
    color: var(--text-dim);
    cursor: not-allowed;
    box-shadow: none;
  }
  .btn-submit .spinner {
    display: none;
    width: 12px;
    height: 12px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: var(--bg);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  .btn-submit.loading .spinner { display: inline-block; }
  .btn-submit.loading .btn-label { opacity: 0.6; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .hint-text {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.03em;
  }

  /* ── log / output ── */
  .log-wrap {
    margin-top: 32px;
  }
  .log {
    background: #080a09;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 16px;
    font-size: 12px;
    min-height: 64px;
    max-height: 260px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .log-empty {
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 0.06em;
  }
  .log-line {
    display: flex;
    gap: 10px;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; } }

  .log-time { color: var(--text-dim); flex-shrink: 0; }
  .log-msg  { color: var(--text); flex: 1; }
  .log-line.ok   .log-msg { color: var(--success); }
  .log-line.err  .log-msg { color: var(--danger); }
  .log-line.warn .log-msg { color: var(--warn); }
  .log-line.info .log-msg { color: var(--text-dim); }

  /* ── divider ── */
  .sep {
    border: none;
    border-top: 1px solid var(--border);
    margin: 36px 0;
  }

  /* ── scrollbar ── */
  .log::-webkit-scrollbar { width: 4px; }
  .log::-webkit-scrollbar-track { background: transparent; }
  .log::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }
</style>
</head>
<body>
<div class="shell">

  <header class="header">
    <span class="header-tag">SYS</span>
    <h1>数据上传</h1>
    <span class="header-sub">STOCK_DATA_DIR</span>
  </header>

  <div class="label">选择文件</div>

  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".csv">
    <div class="drop-icon">↑</div>
    <div class="drop-primary">拖拽 CSV 文件至此，或点击选择</div>
    <div class="drop-secondary">仅支持 .csv 格式 &nbsp;·&nbsp; 无大小限制</div>
  </div>

  <div class="file-preview" id="filePreview">
    <div class="file-preview-icon">CSV</div>
    <div class="file-preview-info">
      <div class="file-preview-name" id="previewName">—</div>
      <div class="file-preview-meta" id="previewMeta">—</div>
    </div>
    <button class="file-clear" id="fileClear" title="移除">×</button>
  </div>

  <div class="note">
    <strong>沪深京A股.csv</strong> 上传说明：若文件名为
    <code>沪深京A股.csv</code>，系统将优先使用其中的
    <code>代码</code>、<code>所属行业</code> 两列作为行业分类数据，
    替代 baostock 自动下载的行业源，并自动清除全部分析缓存。
  </div>

  <hr class="sep">

  <div class="actions">
    <button class="btn-submit" id="submitBtn" disabled>
      <span class="spinner"></span>
      <span class="btn-label">上传</span>
    </button>
    <span class="hint-text" id="hintText">请先选择文件</span>
  </div>

  <div class="log-wrap">
    <div class="label" style="margin-top:28px;">运行日志</div>
    <div class="log" id="log">
      <span class="log-empty">— 等待操作 —</span>
    </div>
  </div>

</div>

<script>
  const API = '/api/upload/';

  const dropZone   = document.getElementById('dropZone');
  const fileInput  = document.getElementById('fileInput');
  const filePreview= document.getElementById('filePreview');
  const previewName= document.getElementById('previewName');
  const previewMeta= document.getElementById('previewMeta');
  const fileClear  = document.getElementById('fileClear');
  const submitBtn  = document.getElementById('submitBtn');
  const hintText   = document.getElementById('hintText');
  const logEl      = document.getElementById('log');

  let selectedFile = null;

  // ── logging ────────────────────────────────────────────────────
  function log(msg, type = '') {
    const empty = logEl.querySelector('.log-empty');
    if (empty) empty.remove();

    const now = new Date();
    const ts  = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;

    const line = document.createElement('div');
    line.className = `log-line ${type}`;
    line.innerHTML = `<span class="log-time">${ts}</span><span class="log-msg">${msg}</span>`;
    logEl.appendChild(line);
    logEl.scrollTop = logEl.scrollHeight;
  }

  // ── file size formatter ────────────────────────────────────────
  function fmtSize(bytes) {
    if (bytes < 1024)       return `${bytes} B`;
    if (bytes < 1024*1024)  return `${(bytes/1024).toFixed(1)} KB`;
    return `${(bytes/1024/1024).toFixed(2)} MB`;
  }

  // ── set selected file ──────────────────────────────────────────
  function setFile(file) {
    if (!file) return;
    if (!file.name.endsWith('.csv')) {
      log(`拒绝：仅支持 .csv 文件（收到 "${file.name}"）`, 'err');
      return;
    }
    selectedFile = file;
    previewName.textContent = file.name;
    previewMeta.textContent = `${fmtSize(file.size)}  ·  最后修改 ${new Date(file.lastModified).toLocaleString('zh-CN')}`;
    filePreview.classList.add('visible');
    submitBtn.disabled = false;
    hintText.textContent = `已选：${file.name}`;
    log(`已选择文件：${file.name}  (${fmtSize(file.size)})`, 'info');
  }

  // ── clear file ─────────────────────────────────────────────────
  function clearFile() {
    selectedFile = null;
    fileInput.value = '';
    filePreview.classList.remove('visible');
    submitBtn.disabled = true;
    hintText.textContent = '请先选择文件';
  }

  // ── drag & drop ────────────────────────────────────────────────
  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('dragover');
  });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) setFile(file);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) setFile(fileInput.files[0]);
  });

  fileClear.addEventListener('click', clearFile);

  // ── upload ─────────────────────────────────────────────────────
  submitBtn.addEventListener('click', async () => {
    if (!selectedFile) return;

    submitBtn.disabled = true;
    submitBtn.classList.add('loading');
    submitBtn.querySelector('.btn-label').textContent = '上传中';
    hintText.textContent = '正在传输…';

    log(`开始上传：${selectedFile.name}`);

    const fd = new FormData();
    fd.append('file', selectedFile);

    try {
      const resp = await fetch(API, { method: 'POST', body: fd });
      const data = await resp.json();

      if (resp.ok) {
        log(`✓ 上传成功`, 'ok');
        log(`  文件名：${data.filename}`, 'ok');
        log(`  大小：${fmtSize(data.size)}`, 'ok');
        log(`  路径：${data.path}`, 'info');

        if (selectedFile.name === '沪深京A股.csv') {
          log(`  ★ 已清除分析缓存，下次查询将使用新行业数据`, 'warn');
        }

        hintText.textContent = '上传成功';
        clearFile();
      } else {
        const msg = data.error || `HTTP ${resp.status}`;
        log(`✗ 上传失败：${msg}`, 'err');
        hintText.textContent = '上传失败，请重试';
        submitBtn.disabled = false;
      }
    } catch (err) {
      log(`✗ 网络错误：${err.message}`, 'err');
      hintText.textContent = '网络错误，请重试';
      submitBtn.disabled = false;
    } finally {
      submitBtn.classList.remove('loading');
      submitBtn.querySelector('.btn-label').textContent = '上传';
    }
  });
</script>
</body>
</html>
